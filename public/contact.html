<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - TechZone</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="site-header">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <h2 class="logo mb-0">
            TECHZONE
        </h2>

        <!-- DESKTOP MENU -->

        <div class="d-none d-md-flex align-items-center gap-4">
            <nav class="nav-links">
                <a href="index.html">Store</a>
                <a href="products.html">Products</a>
                <a href="news.html">News</a>
                <a href="contact.html">Contact</a>
                <a href="faq.html">FAQ</a>
                <a href="register.html">Register</a>
                <a href="login.html">Login</a>
                <a href="profile.html">Profile</a>
            </nav>

            <form class="search-bar">
                <input type="text" placeholder="Search...">
                <button type="submit">Go</button>
            </form>
        </div>

        <!-- MOBILE MENU BUTTON -->

        <button
        class="btn btn-outline-light d-md-none"
        type="button"
        data-bs-toggle="offcanvas"
        data-bs-target="#mobileMenu">
            Menu
        </button>
    </div>
</header>

<div class="container my-5">
    <h1 class="text-center mb-4">Contact Us</h1>

    <div id="errorMsg"></div>

    <form id="contactForm" class="p-4 rounded shadow" novalidate>

        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Name</label>
                <input type="text" id="name" name="name" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Surname</label>
                <input type="text" id="surname" name="surname" class="form-control" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" id="email" name="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Phone</label>
            <input type="tel" id="phone" name="phone" class="form-control" placeholder="0123456789" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Topic</label>
            <select id="topic" name="topic" class="form-select" required>
                <option value="">Choose topic...</option>
                <option>Warranty</option>
                <option>Products</option>
                <option>Service</option>
                <option>Shipping</option>
                <option>Other</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Describe your problem</label>
            <textarea id="messageInput" name="message" class="form-control" rows="4" required></textarea>

            <p id="counter">100 characters remaining</p>
        </div>

        <button type="submit" class="btn btn-primary">Send</button>
    </form>

</div>

<footer class="tech-footer">
    <div class="footer-links">
        <a href="index.html">Store</a>
        <a href="products.html">Products</a>
        <a href="news.html">News</a>
        <a href="contact.html">Contact</a>
        <a href="faq.html">FAQ</a>
        <a href="register.html">Register</a>
        <a href="login.html">Login</a>
        <a href="profile.html">Profile</a>
    </div>
    <div class="footer-bottom">
        <p>© 2026 TECHZONE. All rights reserved.</p>
    </div>
</footer>

<script>
var input = document.getElementById("messageInput");
var counter = document.getElementById("counter");


// Character counter
input.addEventListener("input", function() {
    var text = input.value;

    if (text.length > 200) {
        text = text.slice(0, 200);
        input.value = text;
    }

    var remaining = 200 - text.length;
    counter.textContent = remaining + " characters remaining";
});


// Contact form
var form = document.getElementById("contactForm");

form.addEventListener("submit", function(e) {

    e.preventDefault();
    var error = "";

    var name = document.getElementById("name").value;
    var surname = document.getElementById("surname").value;
    var email = document.getElementById("email").value;
    var phone = document.getElementById("phone").value;
    var topic = document.getElementById("topic").value;
    var message = document.getElementById("messageInput").value;

    if (name === "") error += "Name is required<br>";
    if (surname === "") error += "Surname is required<br>";
    if (email === "") error += "Email is required<br>";
    if (phone === "") error += "Phone is required<br>";
    if (topic === "") error += "Please choose a topic<br>";
    if (message === "") error += "Message is required<br>";


    // Email validation
    if (email !== "" && email.indexOf("@") === -1) {
        error += "Email must contain @<br>";
    }


    // Phone validation
    if (phone !== "" && isNaN(phone)) {
        error += "Phone must be numbers only<br>";
    }

    if (phone.length > 10) {
        error += "Phone must not exceed 10 digits<br>";
    }
    //SHOW ERRORS
    if (error !== "") {

        document.getElementById("errorMsg")
        .innerHTML = error;

    } else {

        document.getElementById("errorMsg")
        .innerHTML = "";

        // SEND DATA TO SERVER
        fetch('/api/contacts', {

            method: 'POST',

            headers: {
                'Content-Type': 'application/json'
            },

            body: JSON.stringify({

                name: name,
                surname: surname,
                email: email,
                phone: phone,
                topic: topic,
                message: message
            })
        })

        // Convert response to JSON

        .then(response => response.json())

        // Success message

        .then(data => {

            alert(data.message);

            // Reset form

            form.reset();

            // Reset counter

            counter.textContent =
            "200 characters remaining";
        })

        // Error handling

        .catch(error => {

            console.error(
                'Error submitting form:',
                error
            );
        });
    }
});
</script>

            <a href="profile.html" class="text-white text-decoration-none">Profile</a>
        </nav>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
