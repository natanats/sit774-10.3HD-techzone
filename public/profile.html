<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Profile - TechZone</title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <link
    rel="stylesheet"
    href="style.css">

</head>

<body>

<header class="site-header">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <h2 class="logo mb-0">
            TECHZONE
        </h2>

        <!-- DESKTOP MENU -->

        <div class="d-none d-md-flex align-items-center gap-4">
            <nav class="nav-links">
                <a href="index.html">Store</a>
                <a href="products.html">Products</a>
                <a href="news.html">News</a>
                <a href="contact.html">Contact</a>
                <a href="faq.html">FAQ</a>
                <a href="register.html">Register</a>
                <a href="login.html">Login</a>
                <a href="profile.html">Profile</a>
            </nav>

            <form class="search-bar">
                <input type="text" placeholder="Search...">
                <button type="submit">Go</button>
            </form>
        </div>

        <!-- MOBILE MENU BUTTON -->

        <button
        class="btn btn-outline-light d-md-none"
        type="button"
        data-bs-toggle="offcanvas"
        data-bs-target="#mobileMenu">
            Menu
        </button>
    </div>
</header>

<div class="container my-5">

    <div class="profile-box p-4 rounded shadow mx-auto text-center">

        <h1 class="mb-4">
            Customer Profile
        </h1>

        <div id="profile"></div>

    </div>

</div>

<footer class="tech-footer">

    <div class="footer-links">

        <a href="index.html">Store</a>
        <a href="products.html">Products</a>
        <a href="news.html">News</a>
        <a href="contact.html">Contact</a>
        <a href="faq.html">FAQ</a>
        <a href="register.html">Register</a>
        <a href="login.html">Login</a>
        <a href="profile.html">Profile</a>

    </div>

    <div class="footer-bottom">

        <p>
            © 2026 TECHZONE.
            All rights reserved.
        </p>

    </div>

</footer>

<script>

fetch('/api/user')

.then(response =>
    response.json()
)

.then(data => {

    if (data.user) {

        document.getElementById('profile').innerHTML = `

            <h3>Welcome, ${data.user.name}</h3>
            <p>Username: ${data.user.username}</p>
            <p>Email: ${data.user.email}</p>
            <p>Role: ${data.user.role}</p>
        `;

    } else {

        document.getElementById('profile').innerHTML = `

            <h4>You are not a member yet</h4>
            <p>Please register first.</p>
            <a href="register.html" class="btn btn-primary">Register</a>
        `;
    }
})

.catch(error => {

    document.getElementById(
        'profile'
    ).innerHTML = `

        <h4>
        You are not a member yet
        </h4>

        <p>
        Please register first.
        </p>

        <a
        href="register.html"
        class="btn btn-primary">

            Register

        </a>
    `;

    console.error(error);
});

</script>
<div class="offcanvas offcanvas-start bg-black text-white" id="mobileMenu">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title logo">TECHZONE</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
        <nav class="d-flex flex-column gap-3">
            <a href="index.html" class="text-white text-decoration-none">Store</a>
            <a href="products.html" class="text-white text-decoration-none">Products</a>
            <a href="news.html" class="text-white text-decoration-none">News</a>
            <a href="contact.html" class="text-white text-decoration-none">Contact</a>
            <a href="faq.html" class="text-white text-decoration-none">FAQ</a>
            <a href="register.html" class="text-white text-decoration-none">Register</a>
            <a href="login.html" class="text-white text-decoration-none">Login</a>
            <a href="profile.html" class="text-white text-decoration-none">Profile</a>
        </nav>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
